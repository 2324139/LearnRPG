<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修行之路 — S5 Python 技能樹</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft JhengHei', 'SimSun', serif;
      background: linear-gradient(135deg, #2c1810 0%, #1a0f08 100%);
      color: #d4af37;
      min-height: 100vh;
      padding: 20px;
    }

    .scroll {
      max-width: 1400px;
      margin: 0 auto;
      background: repeating-linear-gradient(
        90deg,
        #3d2817 0px,
        #3d2817 2px,
        #4a3520 2px,
        #4a3520 4px
      );
      border: 3px solid #d4af37;
      border-radius: 5px;
      padding: 40px;
      box-shadow: 
        0 0 20px rgba(212, 175, 55, 0.3),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
      border-bottom: 2px dashed #d4af37;
      padding-bottom: 30px;
    }

    .header h1 {
      font-size: 3em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      margin-bottom: 10px;
      letter-spacing: 3px;
    }

    .header p {
      font-size: 1.2em;
      color: #c9a961;
      font-style: italic;
    }

    .subtitle {
      text-align: center;
      color: #a89968;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 20px;
      background: #d4af37;
      color: #1a0f08;
      border: 2px solid #8b7520;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      font-family: 'Microsoft JhengHei', serif;
    }

    .btn:hover {
      background: #f0d574;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
      transform: translateY(-2px);
    }

    .student-select {
      padding: 8px 15px;
      background: #3d2817;
      color: #d4af37;
      border: 2px solid #d4af37;
      border-radius: 4px;
      font-family: 'Microsoft JhengHei', serif;
      cursor: pointer;
    }

    .student-select option {
      background: #3d2817;
      color: #d4af37;
    }

    .skill-tree {
      display: flex;
      flex-direction: column;
      gap: 50px;
    }

    .level-section {
      border: 2px solid #d4af37;
      border-radius: 5px;
      padding: 25px;
      background: repeating-linear-gradient(
        0deg,
        rgba(212, 175, 55, 0.02) 0px,
        rgba(212, 175, 55, 0.02) 2px,
        transparent 2px,
        transparent 4px
      );
    }

    .level-title {
      font-size: 1.8em;
      color: #f0d574;
      margin-bottom: 20px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
      border-bottom: 1px dashed #d4af37;
      padding-bottom: 10px;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .skill-card {
      padding: 18px;
      border: 2px solid;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
      background: #2c1810;
    }

    .skill-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(240, 213, 116, 0.1), transparent);
      transition: left 0.5s;
    }

    .skill-card:hover::before {
      left: 100%;
    }

    .skill-card.locked {
      border-color: #555;
      opacity: 0.6;
      color: #888;
    }

    .skill-card.available {
      border-color: #d4af37;
      background: #3d2817;
      box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
    }

    .skill-card.in_progress {
      border-color: #4db8ff;
      background: #1a2a3d;
      box-shadow: inset 0 0 10px rgba(77, 184, 255, 0.1);
    }

    .skill-card.completed {
      border-color: #4caf50;
      background: #1a3d1a;
      box-shadow: inset 0 0 10px rgba(76, 175, 80, 0.1);
    }

    .skill-card.mastered {
      border-color: #f0d574;
      background: #3d3d1a;
      box-shadow: 0 0 15px rgba(240, 213, 116, 0.4), inset 0 0 10px rgba(240, 213, 116, 0.1);
      font-weight: bold;
    }

    .skill-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .skill-icon {
      font-size: 1.8em;
    }

    .skill-code {
      font-size: 0.8em;
      opacity: 0.7;
    }

    .skill-name {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .skill-name-ancient {
      font-size: 0.85em;
      color: #c9a961;
      font-style: italic;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #1a0f08;
      border: 1px solid #555;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #8bff8b);
      width: 0%;
      transition: width 0.5s;
    }

    .skill-card.in_progress .progress-fill {
      background: linear-gradient(90deg, #4db8ff, #a0d8ff);
    }

    .skill-card.mastered .progress-fill {
      background: linear-gradient(90deg, #f0d574, #ffd700);
    }

    .skill-stats {
      font-size: 0.85em;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .difficulty {
      display: flex;
      gap: 3px;
      margin-bottom: 8px;
    }

    .star {
      color: #f0d574;
    }

    .prerequisites {
      font-size: 0.75em;
      color: #a89968;
      padding-top: 8px;
      border-top: 1px dashed #555;
      margin-top: 8px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #3d2817;
      border: 3px solid #d4af37;
      padding: 35px;
      border-radius: 5px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
      color: #d4af37;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #d4af37;
      padding-bottom: 15px;
    }

    .modal-title {
      font-size: 1.5em;
      font-weight: bold;
    }

    .close-btn {
      font-size: 2em;
      cursor: pointer;
      color: #d4af37;
      background: none;
      border: none;
      transition: all 0.3s;
    }

    .close-btn:hover {
      color: #f0d574;
      transform: rotate(90deg);
    }

    .modal-section {
      margin-bottom: 20px;
    }

    .modal-section-title {
      font-size: 1.1em;
      color: #f0d574;
      margin-bottom: 10px;
      border-bottom: 1px dashed #d4af37;
      padding-bottom: 5px;
    }

    .modal-section-content {
      margin-left: 15px;
      color: #c9a961;
      font-size: 0.95em;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      background: #2c1810;
      color: #d4af37;
      border: 1px solid #d4af37;
      border-radius: 3px;
      font-family: 'Microsoft JhengHei', serif;
      resize: vertical;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }

    .stat-item {
      background: #2c1810;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 3px;
    }

    .stat-label {
      font-size: 0.8em;
      color: #a89968;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 1.2em;
      font-weight: bold;
      color: #f0d574;
    }

    footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 2px dashed #d4af37;
      color: #a89968;
      font-size: 0.9em;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
      padding: 15px;
      background: rgba(212, 175, 55, 0.05);
      border: 1px dashed #d4af37;
      border-radius: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9em;
    }

    .legend-box {
      width: 20px;
      height: 20px;
      border: 2px solid;
      border-radius: 2px;
    }

    .legend-box.locked { border-color: #555; opacity: 0.6; }
    .legend-box.available { border-color: #d4af37; background: rgba(212, 175, 55, 0.2); }
    .legend-box.in_progress { border-color: #4db8ff; background: rgba(77, 184, 255, 0.2); }
    .legend-box.completed { border-color: #4caf50; background: rgba(76, 175, 80, 0.2); }
    .legend-box.mastered { border-color: #f0d574; background: rgba(240, 213, 116, 0.3); }
  </style>
</head>
<body>
  <div class="scroll">
    <div class="header">
      <h1>📜 修行之路</h1>
      <p>S5 Python 技能樹 — 古風 RPG 版</p>
    </div>

    <div class="subtitle">
      「問蒼天，何以學道？曰：循序漸進，層層遞升，方能登峰造極」
    </div>

    <div class="controls">
      <select class="student-select" id="studentSelect">
        <option value="">選擇修行者...</option>
        <option value="李同">李同</option>
        <option value="王同">王同</option>
        <option value="陳同">陳同</option>
        <option value="黃同">黃同</option>
        <option value="綠同">綠同</option>
      </select>
      <button class="btn" onclick="loadStudentProgress()">確認</button>
      <button class="btn" onclick="resetFilters()">重置</button>
    </div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-box locked"></div>
        <span>🔒 已鎖定</span>
      </div>
      <div class="legend-item">
        <div class="legend-box available"></div>
        <span>✅ 可開始</span>
      </div>
      <div class="legend-item">
        <div class="legend-box in_progress"></div>
        <span>🚀 學習中</span>
      </div>
      <div class="legend-item">
        <div class="legend-box completed"></div>
        <span>✓ 已完成</span>
      </div>
      <div class="legend-item">
        <div class="legend-box mastered"></div>
        <span>⭐ 精通</span>
      </div>
    </div>

    <div class="skill-tree" id="skillTree"></div>

    <footer>
      「修行無止境，每一步都是新的開始」<br>
      最後更新：<span id="lastUpdate">-</span>
    </footer>
  </div>

  <div id="skillModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_KEY = 'your-anon-key';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentStudent = null;
    let skillsData = {};
    let progressData = {};
    let levelNames = {
      1: '第一層：思維基礎',
      2: '第二層：算法入門',
      3: '第三層：Python 基礎',
      4: '第四層：列表與進階',
      5: '第五層：測試與除錯',
      6: '第六層：專題應用'
    };

    async function initSkillTree() {
      await loadSkills();
      renderTree();
      document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-Hant-TW');
    }

    async function loadSkills() {
      const { data, error } = await supabase
        .from('skills')
        .select('*')
        .order('level', { ascending: true })
        .order('id', { ascending: true });

      if (error) {
        console.error('Error:', error);
        alert('技能加載失敗，請檢查 Supabase 連接');
        return;
      }

      data.forEach(skill => {
        skillsData[skill.id] = skill;
      });
    }

    async function loadStudentProgress() {
      currentStudent = document.getElementById('studentSelect').value;
      if (!currentStudent) {
        alert('請選擇一名修行者');
        return;
      }

      const { data, error } = await supabase
        .from('student_progress')
        .select('*')
        .eq('student_id', currentStudent);

      if (error) {
        console.error('Error:', error);
        progressData = {};
      } else {
        progressData = {};
        data.forEach(prog => {
          progressData[prog.skill_id] = prog;
        });
      }

      renderTree();
    }

    function renderTree() {
      const tree = document.getElementById('skillTree');
      tree.innerHTML = '';

      const byLevel = {};
      Object.values(skillsData).forEach(skill => {
        if (!byLevel[skill.level]) byLevel[skill.level] = [];
        byLevel[skill.level].push(skill);
      });

      Object.keys(byLevel).sort((a, b) => a - b).forEach(level => {
        const section = document.createElement('div');
        section.className = 'level-section';

        const title = document.createElement('div');
        title.className = 'level-title';
        title.textContent = levelNames[level] || `第 ${level} 層`;
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'skills-grid';

        byLevel[level].forEach(skill => {
          const card = createSkillCard(skill);
          grid.appendChild(card);
        });

        section.appendChild(grid);
        tree.appendChild(section);
      });
    }

    function createSkillCard(skill) {
      const card = document.createElement('div');
      card.className = 'skill-card';

      const progress = progressData[skill.id] || { status: 'locked', progress: 0 };
      card.classList.add(progress.status);

      const starsHtml = Array(skill.difficulty).fill('<span class="star">★</span>').join('');

      card.innerHTML = `
        <div class="skill-header">
          <div class="skill-icon">${skill.icon_emoji}</div>
          <div class="skill-code">${skill.skill_code}</div>
        </div>
        <div class="skill-name">${skill.skill_name}</div>
        <div class="skill-name-ancient">${skill.skill_name_ancient}</div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress.progress}%"></div>
        </div>
        <div class="skill-stats">${progress.progress}% • ${skill.estimated_hours}h</div>
        <div class="difficulty">${starsHtml}</div>
        ${progress.status === 'locked' ? '<div class="prerequisites">需先掌握前置技能</div>' : ''}
      `;

      card.onclick = () => showSkillDetail(skill, progress);
      return card;
    }

    function showSkillDetail(skill, progress) {
      const modal = document.getElementById('skillModal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');

      title.textContent = `${skill.icon_emoji} ${skill.skill_name}`;

      const statusMap = {
        'locked': '🔒 已鎖定 (需先掌握前置技能)',
        'available': '✅ 可開始修習',
        'in_progress': '🚀 修習中',
        'completed': '✓ 已完成',
        'mastered': '⭐ 精通'
      };

      const statusText = statusMap[progress.status] || '未知狀態';

      body.innerHTML = `
        <div class="modal-section">
          <div class="modal-section-title">古訣名稱</div>
          <div class="modal-section-content">${skill.skill_name_ancient}</div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">狀態</div>
          <div class="modal-section-content">${statusText}</div>
        </div>

        <div class="stat-grid">
          <div class="stat-item">
            <div class="stat-label">修習進度</div>
            <div class="stat-value">${progress.progress}%</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">難度</div>
            <div class="stat-value">${Array(skill.difficulty).fill('★').join('')}</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">預計時長</div>
            <div class="stat-value">${skill.estimated_hours} 時</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">嘗試次數</div>
            <div class="stat-value">${progress.attempts || 0} 次</div>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">秘訣說明</div>
          <div class="modal-section-content">${skill.description_ancient}</div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">修習心得</div>
          <textarea id="reflection" placeholder="記下你的修習感悟..."></textarea>
        </div>

        <div style="text-align: center; margin-top: 20px;">
          <button class="btn" onclick="saveReflection(${skill.id})">保存心得</button>
        </div>
      `;

      modal.classList.add('show');
    }

    async function saveReflection(skillId) {
      if (!currentStudent) {
        alert('請先選擇修行者');
        return;
      }

      const reflection = document.getElementById('reflection').value;

      const { error } = await supabase
        .from('learning_logs')
        .insert({
          student_id: currentStudent,
          student_name: currentStudent,
          skill_id: skillId,
          action: 'reflection',
          reflection: reflection
        });

      if (error) {
        console.error('Error:', error);
        alert('保存失敗');
      } else {
        alert('心得已記錄於修行日誌');
        closeModal();
      }
    }

    function closeModal() {
      document.getElementById('skillModal').classList.remove('show');
    }

    function resetFilters() {
      document.getElementById('studentSelect').value = '';
      currentStudent = null;
      progressData = {};
      renderTree();
    }

    window.onload = initSkillTree;
  </script>
</body>
</html>
